name: Windows CI

on:
  push:
    branches: [windows-port]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25  # actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: dotnet info
        run: dotnet --info

      - name: Restore (Core + App)
        run: |
          dotnet restore windows/src/AINotebook.Core/AINotebook.Core.csproj
          dotnet restore windows/src/AINotebook.App/AINotebook.App.csproj

      - name: Build Core (Release)
        run: dotnet build windows/src/AINotebook.Core/AINotebook.Core.csproj -c Release --no-restore

      - name: Test Core
        run: dotnet test windows/tests/AINotebook.Core.Tests/AINotebook.Core.Tests.csproj -c Release

      - name: Build App (WinUI 3, x64)
        # detailed verbosity so the XAML compiler (XamlCompiler.exe) surfaces its
        # actual diagnostics — at normal verbosity it can exit 1 silently.
        run: dotnet build windows/src/AINotebook.App/AINotebook.App.csproj -c Release -p:Platform=x64 -v detailed

      - name: Test App
        run: dotnet test windows/tests/AINotebook.App.Tests/AINotebook.App.Tests.csproj -c Release -p:Platform=x64
